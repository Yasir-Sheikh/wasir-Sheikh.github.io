  <title>RGB Mixer</title>

    <script src="/javascript/sketch.js"></script>

	<body>
		<canvas id="Click" width="1000" height="1000" style="border:10px solid black;"></canvas>

	 <script>
	var c = document.getElementById("Click");
	var ctx = c.getContext("2d");
	ctx.beginPath();
	ctx.rect(400,400,20,20);
	ctx.fillStyle="blue";
	ctx.fill();
	ctx.rect(600,600,20,20);
	ctx.fillStyle="red";
	ctx.fill();
		 
		 
    </script>
